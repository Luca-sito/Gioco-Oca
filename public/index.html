<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gioco dell'Oca — PUB · BAR · OSTERIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">🪿</span>
    <span class="brand-text">Gioco dell'Oca</span>
  </div>
  <div class="topbar-sub">tre insegne, una tavola, nessuna oca lasciata indietro</div>
</header>

<!-- SCHERMATA SCELTA STANZA -->
<section id="screen-rooms" class="screen">
  <div class="rooms-intro">
    <h1>Scegli l'insegna</h1>
    <p>Entra in una sala, aspetta gli altri avventori: si parte appena il tavolo è al completo.</p>
  </div>

  <div class="name-field">
    <label for="player-name">Il tuo nome</label>
    <input id="player-name" type="text" maxlength="20" placeholder="Come ti chiamano al bancone?" />
  </div>

  <div class="rooms-grid" id="rooms-grid">
    <!-- popolato via JS -->
  </div>

  <div id="unlock-box" class="unlock-box hidden">
    <label for="unlock-code">Codice d'ingresso OSTERIA</label>
    <input id="unlock-code" type="text" placeholder="Codice premium" />
    <button id="unlock-confirm">Entra in OSTERIA</button>
    <button id="unlock-cancel" class="ghost">Annulla</button>
  </div>

  <p id="room-error" class="room-error"></p>
</section>

<!-- SCHERMATA STANZA / PARTITA -->
<section id="screen-game" class="screen hidden">
  <div class="game-layout">

    <div class="board-panel">
      <div class="room-header">
        <h2 id="room-title">—</h2>
        <span id="room-status" class="pill">in attesa</span>
      </div>

      <div id="board" class="board"></div>

      <div class="controls">
        <button id="roll-btn" disabled>🎲 Tira il dado</button>
        <span id="turn-indicator">In attesa di altri giocatori…</span>
        <button id="leave-btn" class="ghost">Esci dalla stanza</button>
      </div>

      <ul id="players-list" class="players-list"></ul>
    </div>

    <aside class="chat-panel">
      <h3>Chat della sala</h3>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" maxlength="300" placeholder="Scrivi un messaggio…" autocomplete="off" />
        <button type="submit">Invia</button>
      </form>
    </aside>

  </div>
</section>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
